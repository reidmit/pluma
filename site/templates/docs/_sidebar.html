{% set docs = get_section(path="docs/_index.md") %}
<aside class="sidebar">
	<h2>Getting started</h2>
	<ul>
		<li><a href="{{ docs.permalink | safe }}"{% if current_path == docs.path %} class="current"{% endif %}>Overview</a></li>
	</ul>

	<h2>Language</h2>
	<ul>
		{% for p in docs.pages %}
		<li><a href="{{ p.permalink | safe }}"{% if current_path == p.path %} class="current"{% endif %}>{{ p.title }}</a></li>
		{% endfor %}
	</ul>
</aside>
