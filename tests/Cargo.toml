[package]
name = "tests"
version = "0.1.0"
edition = "2024"
publish = false

# Cross-backend correctness + perf lives in the `conformance` crate now; this
# crate holds the VM-only snapshot suites (analyze/run/format) + the IR tests.
[dependencies]
codegen = { path = "../codegen" }
compiler = { path = "../compiler" }
formatter = { path = "../formatter" }
ir = { path = "../ir" }
vm = { path = "../vm" }

[dev-dependencies]
datatest-stable = "0.3"
insta = "1"

[[test]]
name = "analyze"
path = "analyze.rs"
harness = false

[[test]]
name = "format"
path = "format.rs"
harness = false

[[test]]
name = "run"
path = "run.rs"
harness = false

[[test]]
name = "ir_repr"
path = "ir_repr.rs"

[[test]]
name = "ir_mono"
path = "ir_mono.rs"

[[test]]
name = "cps"
path = "cps.rs"

[[test]]
name = "vm_errors"
path = "vm_errors.rs"
