[package]
name = "tests"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
codegen = { path = "../codegen" }
compiler = { path = "../compiler" }
formatter = { path = "../formatter" }
ir = { path = "../ir" }
vm = { path = "../vm" }
wasm = { path = "../wasm" }

[dev-dependencies]
datatest-stable = "0.3"
insta = "1"
wasmtime = { version = "45", default-features = false, features = ["cranelift", "gc", "gc-drc", "gc-null", "runtime"] }

[[test]]
name = "analyze"
path = "analyze.rs"
harness = false

[[test]]
name = "format"
path = "format.rs"
harness = false

[[test]]
name = "run"
path = "run.rs"
harness = false

[[test]]
name = "ir_repr"
path = "ir_repr.rs"

[[test]]
name = "ir_mono"
path = "ir_mono.rs"

[[test]]
name = "cps"
path = "cps.rs"

[[test]]
name = "wasm_diff"
path = "wasm_diff.rs"
