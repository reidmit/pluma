[package]
name = "host"
version = "0.1.0"
edition = "2024"
publish = false

# The WasmGC runtime host: embeds wasmtime and supplies the `pluma.*` host imports
# (print/io/float_to_str/math) by reflecting the module's GC `$value` layout. This
# is the *single* host — `cli` runs a built `.wasm` through it (streaming process
# stdio), and `conformance` runs every fixture through it (buffered, to diff against
# the VM oracle). The differential gate therefore tests exactly what ships.

[dependencies]
wasmtime = { version = "45", default-features = false, features = [
	"cranelift",
	"gc",
	"gc-drc",
	"gc-null",
	"runtime",
] }
